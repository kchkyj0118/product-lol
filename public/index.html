<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL AI PRO COACH</title>
    <style>
        :root { --gold: #c89b3c; --blue: #3d8bff; --red: #ff4d4d; --dark: #0f1217; --panel: #1e232a; --input: #2a3039; }
        body { font-family: 'Pretendard', sans-serif; background: var(--dark); color: #ececec; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--gold); font-size: 2.2rem; margin-bottom: 5px; }

        /* 대결 구도 레이아웃 */
        .matchup-wrapper { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 20px; margin-bottom: 20px; }
        .team-panel { background: var(--panel); border-radius: 12px; padding: 20px; border-top: 5px solid #ccc; min-height: 200px; }
        .blue-side { border-color: var(--blue); }
        .red-side { border-color: var(--red); }
        .vs-zone { display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: var(--gold); }

        /* 입력 행 스타일 */
        .lane-row { position: relative; display: grid; grid-template-columns: 80px 1fr 90px 90px; gap: 8px; margin-bottom: 15px; align-items: center; animation: fadeIn 0.3s ease; }
        .red-side .lane-row { grid-template-columns: 80px 1fr 90px 90px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .lane-label { font-size: 0.8rem; color: #888; font-weight: bold; }
        input, select { background: var(--input); color: white; border: 1px solid #3c4450; padding: 10px; border-radius: 6px; width: 100%; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--gold); }

        /* 자동완성 목록 */
        .autocomplete-list { position: absolute; top: 100%; left: 88px; right: 196px; background: #333; border: 1px solid #444; z-index: 100; border-radius: 0 0 6px 6px; max-height: 150px; overflow-y: auto; display: none; }
        .autocomplete-list div { padding: 10px; cursor: pointer; border-bottom: 1px solid #444; }
        .autocomplete-list div:hover { background: var(--gold); color: black; }

        /* 버튼 스타일 */
        .add-btn { background: none; border: 1px dashed #555; color: #888; padding: 10px; cursor: pointer; width: 100%; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        .add-btn:hover { border-color: var(--gold); color: var(--gold); }
        .analyze-btn { background: var(--gold); color: black; font-weight: bold; font-size: 1.2rem; padding: 18px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 30px; }
        
        #result-display { margin-top: 30px; padding: 25px; background: #161a20; border-radius: 12px; border-left: 6px solid var(--gold); white-space: pre-wrap; display: none; line-height: 1.8; }
        
        footer { text-align: center; padding: 40px 20px; font-size: 0.85rem; color: #666; }
        footer a { color: #888; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LOL AI PRO COACH</h1>
        <p>1:1 매치업부터 5:5 한타까지 커스텀 분석</p>
    </div>

    <div class="matchup-wrapper">
        <div class="team-panel blue-side">
            <div id="blue-list"></div>
            <button class="add-btn" onclick="addChamp('blue')">+ 아군 추가하기</button>
        </div>

        <div class="vs-zone">VS</div>

        <div class="team-panel red-side">
            <div id="red-list"></div>
            <button class="add-btn" onclick="addChamp('red')">+ 적군 추가하기</button>
        </div>
    </div>

    <button class="analyze-btn" onclick="runAnalysis()">프로급 전략 분석 시작</button>
    <div id="result-display"></div>
</div>

<footer>
    <p>© 2026 lol-coaches.com | All Rights Reserved.</p>
</footer>

<script>
    const CHAMPIONS = ["가렌", "갈리오", "강구", "갱플랭크", "그라가스", "그레이브즈", "나르", "나미", "나서스", "노틸러스", "녹턴", "누누와 월럼프", "니달리", "니코", "닐라", "다리우스", "다이애나", "드레이븐", "라이즈", "라칸", "람머스", "럭스", "럼블", "레나타 글라스크", "레넥톤", "레오나", "렉사이", "렐", "렌가", "루시안", "루루", "르블랑", "리 신", "리븐", "리산드라", "릴리아", "마스터 이", "마오카이", "말자하", "말파이트", "모데카이저", "모르가나", "문도 박사", "미스 포츈", "밀리오", "바드", "바루스", "바이", "베이가", "베인", "벨코즈", "벨베스", "볼리베어", "브라이어", "브랜드", "브라움", "블라디미르", "블리츠크랭크", "비에고", "빅토르", "뽀삐", "사미라", "사이온", "사일러스", "샤코", "세나", "세라핀", "세주아니", "세트", "소나", "소라카", "쉔", "쉬바나", "스웨인", "스카너", "스몰더", "시비르", "신 짜오", "신드라", "신지드", "쓰레쉬", "아리", "아무무", "아우렐리온 솔", "아이번", "아지르", "아칼리", "아크샨", "아트록스", "아펠리오스", "알리스타", "애니", "애니비아", "애쉬", "야스오", "에코", "엘리스", "오공", "오른", "오리아나", "올라프", "요네", "요릭", "우디르", "우르곳", "워윅", "유미", "이렐리아", "이베르", "이벨린", "이즈리얼", "일라오이", "자르반 4세", "자야", "자크", "잔나", "잭스", "제드", "제라스", "제이스", "제리", "조이", "직스", "진", "질리언", "징크스", "초가스", "카르마", "카밀", "카사딘", "카서스", "카시오페아", "카이사", "카직스", "카타리나", "칼리스타", "케넨", "케일", "케인", "케이틀린", "코그모", "코르키", "퀸", "클레드", "키아나", "킨드레드", "타릭", "탈론", "탈리야", "탐 켄치", "트런들", "트리스타나", "트린다미어", "트위스티드 페이트", "트위치", "티모", "파이크", "판테온", "피들스틱", "피오라", "피즈", "하이머딩거", "헤카림", "흐웨이"];
    const lanes = ["TOP", "JUNGLE", "MID", "ADC", "SUP"];
    const spells = ["점멸", "강타", "점화", "텔포", "탈진", "유체화", "정화", "회복"];

    function addChamp(side) {
        const list = document.getElementById(side + '-list');
        const count = list.children.length;
        if (count >= 5) return;
        
        const row = document.createElement('div');
        row.className = 'lane-row';
        row.innerHTML = `
            <div class="lane-label">${lanes[count]}</div>
            <input type="text" class="${side}-n" placeholder="챔피언" oninput="showAuto(this)">
            <div class="autocomplete-list"></div>
            <select class="${side}-s1">${spells.map(s => `<option ${s==='점멸'?'selected':''}>${s}</option>`).join('')}</select>
            <select class="${side}-s2">${spells.map(s => `<option ${lanes[count]==='JUNGLE'&&s==='강타'?'selected':''}>${s}</option>`).join('')}</select>
        `;
        list.appendChild(row);
    }

    function showAuto(input) {
        const val = input.value;
        const list = input.nextElementSibling;
        list.innerHTML = '';
        if (!val) { list.style.display = 'none'; return; }
        
        const filtered = CHAMPIONS.filter(c => c.includes(val));
        if (filtered.length === 0) { list.style.display = 'none'; return; }
        
        list.style.display = 'block';
        filtered.slice(0, 5).forEach(c => {
            const div = document.createElement('div');
            div.innerText = c;
            div.onclick = () => { input.value = c; list.style.display = 'none'; };
            list.appendChild(div);
        });

        // 클릭 외에 외부 클릭 시 닫기
        document.addEventListener('click', (e) => {
            if (e.target !== input) list.style.display = 'none';
        }, { once: true });
    }

    // 초기 세팅
    window.onload = () => {
        addChamp('blue'); addChamp('red');
    };

    async function runAnalysis() {
        const res = document.getElementById('result-display');
        res.style.display = "block";
        res.innerText = "🌀 프로 코치가 데이터 대조 중입니다...";

        const blueData = Array.from(document.querySelectorAll('.blue-side .lane-row')).map(row => {
            const name = row.querySelector('.blue-n').value;
            const s1 = row.querySelector('.blue-s1').value;
            const s2 = row.querySelector('.blue-s2').value;
            return name ? `${name}(${s1}/${s2})` : '';
        }).filter(n => n).join(',');

        const redData = Array.from(document.querySelectorAll('.red-side .lane-row')).map(row => {
            const name = row.querySelector('.red-n').value;
            const s1 = row.querySelector('.red-s1').value;
            const s2 = row.querySelector('.red-s2').value;
            return name ? `${name}(${s1}/${s2})` : '';
        }).filter(n => n).join(',');

        if (!blueData || !redData) {
            alert("아군과 적군 각각 최소 1명의 챔피언을 입력해주세요.");
            res.style.display = "none";
            return;
        }

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ myTeam: blueData, opTeam: redData })
            });
            const data = await response.json();
            res.innerText = data.text;
        } catch (e) {
            res.innerText = "분석 중 오류가 발생했습니다. 서버 설정을 확인해주세요.";
        }
    }
</script>

</body>
</html>
