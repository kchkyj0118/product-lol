<div id="footer-area" style="margin-top: 50px; border-top: 1px solid #2d2d31; padding-top: 20px;">
    <div id="ai-tip" style="background: rgba(232, 169, 58, 0.05); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px;">
        <span style="color: #e8a93a; font-weight: bold;">💡 PickView Tip:</span> 
        <span id="tip-text" style="color: #9e9eb1; font-size: 14px;">챔피언 이름을 영문으로 입력하면 시뮬레이션에 이미지가 표시됩니다!</span>
    </div>

    <div id="recent-search">
        <h4 style="color: #e8a93a; font-size: 14px; margin-bottom: 10px;">최근 분석한 소환사</h4>
        <div id="recent-list" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <span style="color: #555; font-size: 12px;">최근 기록이 없습니다.</span>
        </div>
    </div>
</div>

<script>
    // 검색 시 최근 리스트에 추가하는 로직 (기존 api 함수 내에 추가)
    function saveRecent(name, tag) {
        let list = JSON.parse(localStorage.getItem('recentPick') || '[]');
        const entry = `${name}#${tag}`;
        if(!list.includes(entry)) {
            list.unshift(entry);
            list = list.slice(0, 5); // 최근 5개만 저장
            localStorage.setItem('recentPick', JSON.stringify(list));
            renderRecent();
        }
    }

    function renderRecent() {
        const list = JSON.parse(localStorage.getItem('recentPick') || '[]');
        const el = document.getElementById('recent-list');
        if(list.length > 0) {
            el.innerHTML = list.map(item => {
                const [n, t] = item.split('#');
                return `<span onclick="document.getElementById('name').value='${n}'; document.getElementById('tag').value='${t}'; runLive();" 
                        style="background:#1c1c1f; padding:5px 10px; border-radius:15px; font-size:12px; cursor:pointer; border:1px solid #323232;">
                        ${item}</span>`;
            }).join('');
        }
    }
    // 페이지 로드 시 호출
    renderRecent();
</script>
