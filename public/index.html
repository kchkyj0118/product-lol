<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL 실시간 승리 전략 분석기</title>
    <style>
        :root {
            --bg-color: #0f1014;
            --blue-team: #28344e;
            --red-team: #59343b;
            --text-main: #ffffff;
            --text-sub: #9e9eb1;
            --gold: #e8a93a;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--gold); font-size: 2.5rem; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; background: #1c1c1f; padding: 20px; border-radius: 12px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #323232; background: #0f1014; color: white; width: 200px; }
        button { padding: 12px 30px; background: var(--gold); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ffc154; transform: translateY(-2px); }
        
        .game-board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team-container { border-radius: 12px; overflow: hidden; background: #1c1c1f; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .team-header { padding: 12px 20px; font-weight: bold; font-size: 16px; letter-spacing: 1px; }
        .blue-header { background: var(--blue-team); border-bottom: 2px solid #3d568c; }
        .red-header { background: var(--red-team); border-bottom: 2px solid #8c3d4a; }
        
        .player-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #2d2d31; gap: 15px; transition: 0.2s; }
        .player-row:hover { background: #252529; }
        .champ-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; }
        .name-box { flex-grow: 1; }
        .player-name { font-size: 15px; font-weight: bold; display: block; }
        .player-tag { font-size: 12px; color: var(--text-sub); }
        
        .analysis-box { margin-top: 40px; background: #1c1c1f; border-left: 5px solid var(--gold); padding: 25px; border-radius: 12px; line-height: 1.6; }
        .analysis-box h3 { margin-top: 0; color: var(--gold); }
        #loading { text-align: center; display: none; margin: 30px; font-size: 1.2rem; color: var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏆 실시간 인게임 분석</h1></div>
        <div class="search-box">
            <input type="text" id="name" placeholder="소환사명 (예: 저받다)">
            <input type="text" id="tag" placeholder="태그 (예: KR1)">
            <button onclick="startAnalysis()">실시간 분석 시작</button>
        </div>

        <div id="loading">✨ Gemini 3 Flash가 게임 데이터를 분석 중입니다...</div>
        
        <div class="game-board" id="gameBoard"></div>

        <div id="analysisResult" class="analysis-box" style="display: none;">
            <h3>🤖 Gemini의 전략 제언</h3>
            <div id="strategyText"></div>
        </div>
    </div>

    <script>
        async function startAnalysis() {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            const loading = document.getElementById('loading');
            const board = document.getElementById('gameBoard');
            const resultBox = document.getElementById('analysisResult');

            if(!name || !tag) return alert('정보를 입력하세요.');

            loading.style.display = 'block';
            board.innerHTML = '';
            resultBox.style.display = 'none';

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ summonerName: name, tagLine: tag })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                renderTeams(data.teams);
                document.getElementById('strategyText').innerHTML = data.strategy.replace(/\n/g, '<br>');
                resultBox.style.display = 'block';
            } catch (err) {
                alert('오류: ' + err.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderTeams(teams) {
            const board = document.getElementById('gameBoard');
            ['Blue', 'Red'].forEach(side => {
                const teamHtml = `
                    <div class="team-container">
                        <div class="team-header ${side.toLowerCase()}-header">${side.toUpperCase()} TEAM</div>
                        ${teams[side].map(p => `
                            <div class="player-row">
                                <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/Shaco.png" class="champ-img">
                                <div class="name-box">
                                    <span class="player-name">${p.name}</span>
                                    <span class="player-tag">#${p.tag}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                board.innerHTML += teamHtml;
            });
        }
    </script>
</body>
</html>
