<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Win Plan AI</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0f1217; color: white; text-align: center; margin: 0; padding: 0; }
        .container { margin-top: 80px; padding: 20px; }
        h1 { color: #c89b3c; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #a0a0a0; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        input { padding: 15px; width: 250px; border-radius: 8px; border: 1px solid #3c4450; background: #1e232a; color: white; font-size: 1rem; margin-right: 10px; }
        button { padding: 15px 30px; cursor: pointer; background: #c89b3c; color: #0f1217; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #e5b34c; }
        #result { margin-top: 40px; padding: 30px; background: #1e232a; border-radius: 12px; border-left: 6px solid #c89b3c; display: none; width: 80%; max-width: 800px; margin-left: auto; margin-right: auto; text-align: left; line-height: 1.8; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .loading { color: #c89b3c; font-weight: bold; font-size: 1.1rem; }
        .strategy-content { white-space: pre-wrap; font-size: 1.1rem; }
        .error-msg { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 LoL 실시간 승리 전략 분석기</h1>
        <p>현재 게임 중인 소환사 명과 태그를 입력하세요.</p>
        
        <div class="input-group">
            <input type="text" id="summoner" placeholder="소환사명" value="">
            <input type="text" id="tag" placeholder="태그 (예: KR1)" value="KR1">
            <button onclick="analyzeGame()">실시간 분석 시작</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function analyzeGame() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p class="loading">🌀 현재 진행 중인 매치 정보를 가져오는 중...</p>';

            const name = document.getElementById('summoner').value.trim();
            const tag = document.getElementById('tag').value.trim();

            if (!name || !tag) {
                resultDiv.innerHTML = '<p class="error-msg">❌ 소환사 명과 태그를 모두 입력해주세요.</p>';
                return;
            }

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ summonerName: name, tagLine: tag })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `<p class="error-msg">❌ 오류: ${data.error}</p>`;
                } else {
                    resultDiv.innerHTML = `
                        <h3 style="color:#c89b3c; margin-top:0;">🤖 Gemini의 실시간 승리 제언:</h3>
                        <div class="strategy-content">${data.strategy}</div>
                    `;
                }
            } catch (err) {
                resultDiv.innerHTML = '<p class="error-msg">❌ 서버 연결에 실패했습니다. (네트워크 확인)</p>';
            }
        }
    </script>
</body>
</html>
