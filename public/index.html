<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL.ANALYZE - 초고속 분석</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* 하얀바탕에 하얀글씨 방지 - 무조건 블랙 배경 */
        body { background-color: #000 !important; color: #fff !important; font-family: sans-serif; }
        .player-card { background: #111; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; align-items: center; }
        .nick-name { font-size: 1.25rem; font-weight: 900; color: #3b82f6; line-height: 1.2; } /* 닉네임 왕크게 */
        .champ-name { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .summary-box { background: #111; border: 2px solid #3b82f6; padding: 20px; border-radius: 15px; }
        .strategy-text { white-space: pre-line; line-height: 1.7; color: #eee; font-size: 1rem; }
        input { background: #1a1d20 !important; color: #fff !important; border: 1px solid #444 !important; }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-5xl mx-auto p-4 md:p-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic text-blue-500 mb-8 tracking-tighter uppercase">Lol.Analyze</h1>
            <div class="inline-flex bg-[#1a1d20] border border-gray-700 rounded-2xl p-2">
                <input type="text" id="name" placeholder="닉네임" class="px-4 py-2 outline-none w-32 md:w-48 text-sm rounded-l-xl">
                <span class="text-gray-600 self-center font-bold px-1">#</span>
                <input type="text" id="tag" placeholder="KR1" class="px-2 py-2 outline-none w-16 md:w-20 font-bold text-blue-400">
                <button onclick="fetchGame()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold ml-2 transition-all active:scale-95 text-sm">분석</button>
            </div>
        </header>

        <div id="loader" class="hidden text-center py-20 text-blue-400 font-bold">⚡ 초고속 엔진 가동 중...</div>

        <div id="dashboard" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div id="blue-list" class="space-y-2"></div>
                <div id="red-list" class="space-y-2"></div>
            </div>

            <div id="analysis-area" class="summary-box"></div>
        </div>
    </div>

    <script>
        const sMap = { 1: "SummonerBoost", 3: "SummonerExhaust", 4: "SummonerFlash", 6: "SummonerHaste", 7: "SummonerHeal", 11: "SummonerSmite", 12: "SummonerTeleport", 14: "SummonerDot", 21: "SummonerBarrier" };
        const rMap = { 8000: "7201_Precision", 8100: "7200_Domination", 8200: "7202_Sorcery", 8300: "7203_Whimsy", 8400: "7204_Resolve" };

        function renderTeams(pList, ver) {
            const blue = document.getElementById('blue-list');
            const red = document.getElementById('red-list');
            blue.innerHTML = '<h2 class="text-blue-500 font-black text-xs mb-2">BLUE</h2>';
            red.innerHTML = '<h2 class="text-red-500 font-black text-xs mb-2 text-right">RED</h2>';

            pList.forEach(p => {
                const isBlue = p.team === 100;
                const rIcon = rMap[p.r] || "7200_Domination";
                const html = `
                    <div class="player-card ${isBlue ? '' : 'flex-row-reverse'}">
                        <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/champion/${p.cName}.png" class="w-12 h-12 rounded-lg border border-[#444]">
                        <div class="mx-4 flex-1 ${isBlue ? 'text-left' : 'text-right'}">
                            <div class="nick-name">${p.nick}</div>
                            <div class="champ-name">${p.cName}</div>
                        </div>
                        <div class="flex gap-1">
                            <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/${rIcon}.png" class="w-6 h-6 opacity-80">
                        </div>
                    </div>`;
                (isBlue ? blue : red).innerHTML += html;
            });
        }

        async function fetchGame() {
            const n = document.getElementById('name').value.trim();
            const t = document.getElementById('tag').value.trim();
            if (!n || !t) return alert("입력 필수");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: n, tag: t })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                renderTeams(data.pList, data.ver);
                document.getElementById('analysis-area').innerHTML = `
                    <h2 class="text-xl font-black text-yellow-400 mb-4 uppercase">⚡ 실전 압축 훈수 [${data.myC}]</h2>
                    <div class="strategy-text">${data.strategy}</div>
                `;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
