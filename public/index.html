<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL AI 프로 코치 | lol-coaches.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header">
            <h1>LOL AI PRO COACH</h1>
            <p>프로팀 코칭 알고리즘 기반 정밀 분석</p>
        </div>

        <div class="input-group">
            <label>내 포지션 선택</label>
            <select id="user-position">
                <option value="탑">TOP (탑)</option>
                <option value="정글">JUNGLE (정글)</option>
                <option value="미드">MID (미드)</option>
                <option value="원딜">ADC (원딜)</option>
                <option value="서포터">SUP (서포터)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>내 챔피언</label>
                <input type="text" id="my-champ" placeholder="예: 리신">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>상대 챔피언</label>
                <input type="text" id="op-champ" placeholder="예: 카직스">
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label>내 스펠</label>
                <select id="my-spell">
                    <option value="점멸/강타">점멸/강타</option>
                    <option value="점화/강타">점화/강타</option>
                    <option value="텔포/점멸">텔포/점멸</option>
                    <option value="점멸/점화">점멸/점화</option>
                    <option value="점멸/탈진">점멸/탈진</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>교전 규모</label>
                <select id="fight-scale">
                    <option value="1대1">1대1 (라인전/카정)</option>
                    <option value="2대2">2대2 (소규모 교전)</option>
                    <option value="3대3">3대3 (오브젝트 싸움)</option>
                    <option value="5대5">5대5 (한타)</option>
                </select>
            </div>
        </div>

        <button onclick="startAnalysis()">프로 코칭 시작하기</button>

        <div id="result-display" style="display: none; background: #161a20; padding: 20px; border-radius: 10px; border-left: 4px solid #c89b3c; margin-top: 20px;">
            <div id="ai-content" style="line-height: 1.8; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div class="faq-section">
        <h3>승률을 높이는 AI 코칭 가이드</h3>
        <details>
            <summary>분석 결과가 나오지 않는다면?</summary>
            <p>네트워크 상태를 확인하고, API 키가 올바르게 설정되어 있는지 확인해주세요.</p>
        </details>
        <details>
            <summary>모든 티어에서 사용 가능한가요?</summary>
            <p>아이언부터 챌린저까지 각 티어별 평균 데이터를 기반으로 최적의 동선을 제시합니다.</p>
        </details>
    </div>
</div>

<footer>
    <p>© 2026 lol-coaches.com | All Rights Reserved.</p>
    <p>
        <a href="/privacy">개인정보 처리방침</a> | 
        <a href="/terms">이용약관</a>
    </p>
</footer>

<script src="main.js"></script>

</body>
</html>
