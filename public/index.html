<div id="sim-box" class="search-box">
    <select id="pos-sel"><option>TOP</option><option>JNG</option><option>MID</option><option>ADC</option><option>SUP</option></select>
    
    <div style="position:relative;">
        <input type="text" id="champ-in" oninput="updatePreview(this.value)" style="width:150px;">
        <img id="champ-preview" src="" style="width:30px; position:absolute; right:10px; top:10px; border-radius:50%; display:none;">
    </div>

    <select id="spell-d" title="D Spell">
        <option value="SummonerFlash">Flash</option>
        <option value="SummonerIgnite">Ignite</option>
        <option value="SummonerTeleport">Teleport</option>
        <option value="SummonerSmite">Smite</option>
    </select>
    <select id="spell-f" title="F Spell">
        <option value="SummonerFlash" selected>Flash</option>
        <option value="SummonerExhaust">Exhaust</option>
        <option value="SummonerHeal">Heal</option>
        <option value="SummonerDot">Ignite</option>
    </select>

    <button onclick="addSim('Blue')" style="background:#4171d6; color:white;" class="main-btn">Blue +</button>
    <button onclick="addSim('Red')" style="background:#e84057; color:white;" class="main-btn">Red +</button>
    <button onclick="runSim()" id="btn-sim-run" class="main-btn">결과 보기</button>
</div>

<script>
    // 챔피언 입력 시 미리보기 이미지 업데이트
    function updatePreview(val) {
        const img = document.getElementById('champ-preview');
        if(val.length > 2) {
            img.src = `https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${val}.png`;
            img.style.display = 'block';
            img.onerror = () => img.style.display = 'none';
        } else {
            img.style.display = 'none';
        }
    }

    // 시뮬레이션 데이터에 스펠 추가
    function addSim(t) {
        const c = document.getElementById('champ-in').value.trim();
        if(!c) return;
        
        simData[t].push({ 
            pos: document.getElementById('pos-sel').value, 
            champ: c,
            spellD: document.getElementById('spell-d').value,
            spellF: document.getElementById('spell-f').value
        });
        
        document.getElementById('champ-in').value = '';
        document.getElementById('champ-preview').style.display = 'none';
        renderSim();
    }

    // 렌더링 시 초상화와 스펠 아이콘 표시
    function renderSim() {
        const disp = document.getElementById('display');
        disp.innerHTML = ['Blue', 'Red'].map(side => `
            <div class="team ${side.toLowerCase()}"><strong>${side} TEAM</strong>
            ${simData[side].map((p, i) => `
                <div class="p-row">
                    <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${p.champ}.png" class="c-img" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.5.1/img/profileicon/29.jpg'">
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${p.spellD}.png" style="width:16px;">
                        <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${p.spellF}.png" style="width:16px;">
                    </div>
                    <div style="font-size:13px;"><b>${p.pos}</b><br><small>${p.champ}</small></div>
                    <span style="margin-left:auto; color:#e84057; cursor:pointer;" onclick="simData['${side}'].splice(${i},1);renderSim();">×</span>
                </div>`).join('')}
            </div>
        `).join('');
    }
</script>
