<div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px;">
    <button onclick="setLang('ko')" class="lang-btn" id="btn-ko">KO</button>
    <button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button>
</div>

<style>
    .lang-btn { background: #1c1c1f; color: #555; border: 1px solid #323232; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    .lang-btn.active { color: #e8a93a; border-color: #e8a93a; }
</style>

<script>
    // 다국어 데이터 설정
    const i18n = {
        ko: {
            sub: "AI STRATEGIC COACHING SERVICE",
            live: "실시간 분석",
            sim: "조합 시뮬레이션",
            btn_run: "게임 분석 시작",
            btn_sim: "조합 결과 보기",
            recent: "🕒 최근 분석 기록",
            tip_title: "💡 롤팁 AI의 오늘의 조언",
            tip_text: "상대 조합에 CC기가 많다면 헤르메스의 발걸음을 고려하세요.",
            loading: "✨ 롤팁 AI가 데이터 분석 중...",
            ph_name: "소환사명",
            ph_tag: "태그 (#빼고)",
            ph_champ: "챔피언 영문명 (예: Aatrox)"
        },
        en: {
            sub: "AI STRATEGIC COACHING SERVICE",
            live: "Live Analysis",
            sim: "Team Simulator",
            btn_run: "Start Game Analysis",
            btn_sim: "Analyze Synergy",
            recent: "🕒 Recent Search",
            tip_title: "💡 LoLTip AI Daily Tip",
            tip_text: "If the enemy team has many CC skills, consider buying Mercury's Treads.",
            loading: "✨ LoLPick AI is analyzing data...",
            ph_name: "Summoner Name",
            ph_tag: "Tag (w/o #)",
            ph_champ: "Champ Name (e.g., Aatrox)"
        }
    };

    let curLang = localStorage.getItem('lang') || 'ko';

    function setLang(lang) {
        curLang = lang;
        localStorage.setItem('lang', lang);
        
        // 버튼 활성화 표시
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');

        // 텍스트 일괄 변경
        const t = i18n[lang];
        document.querySelector('header p').innerText = t.sub;
        document.getElementById('tab-live').innerText = t.live;
        document.getElementById('tab-sim').innerText = t.sim;
        document.querySelector('#live-box button').innerText = t.btn_run;
        document.querySelector('#sim-box button:last-child').innerText = t.btn_sim;
        document.querySelector('.footer-info h4').innerText = t.recent;
        document.querySelector('.ai-banner div:nth-child(2)').innerText = t.tip_title;
        document.getElementById('dynamic-tip').innerText = t.tip_text;
        document.getElementById('loading').innerText = t.loading;
        
        // Placeholder 변경
        document.getElementById('name').placeholder = t.ph_name;
        document.getElementById('tag').placeholder = t.ph_tag;
        document.getElementById('champ-in').placeholder = t.ph_champ;
    }

    // 초기 실행 시 언어 설정
    setLang(curLang);

    // API 호출 시 lang 파라미터 추가 (api 함수 수정)
    async function api(body) {
        body.lang = curLang; // 현재 언어 정보 추가
        document.getElementById('loading').style.display = 'block';
        // ... 기존 fetch 코드 ...
    }
</script>
