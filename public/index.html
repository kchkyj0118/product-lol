<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Strategy Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-gray-700 pb-6 gap-4">
            <h1 class="text-2xl font-bold italic text-blue-500 cursor-pointer" onclick="location.reload()">LOL.ANALYZE</h1>
            
            <div class="flex bg-[#1e1e1e] border border-gray-600 rounded-lg overflow-hidden w-full md:w-auto">
                <input type="text" id="summonerName" placeholder="소환사명" class="bg-transparent px-4 py-2 outline-none w-40 text-sm">
                <span class="text-gray-500 py-2">#</span>
                <input type="text" id="tagLine" placeholder="KR1" class="bg-transparent px-2 py-2 outline-none w-20 text-sm">
                <button onclick="startGameAnalysis()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 font-bold transition">분석</button>
            </div>
            
            <div id="status-badge" class="text-xs text-gray-500">대기 중...</div>
        </header>

        <div id="analysis-result" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <section>
                    <h2 class="text-blue-400 font-bold mb-4 flex items-center">🔵 BLUE TEAM <span class="ml-2 text-[10px] text-gray-500 uppercase tracking-widest">Top → Sup</span></h2>
                    <div id="blue-list" class="space-y-2"></div>
                </section>
                <section>
                    <h2 class="text-red-400 font-bold mb-4 flex items-center justify-end text-right">RED TEAM 🔴 <span class="mr-2 text-[10px] text-gray-500 uppercase tracking-widest">Top → Sup</span></h2>
                    <div id="red-list" class="space-y-2 text-right"></div>
                </section>
            </div>

            <div class="mt-12 p-6 bg-[#1e1e1e] rounded-xl border border-blue-900/30">
                <h3 class="text-xl font-bold text-yellow-500 mb-4 font-mono">🏆 AI STRATEGY GUIDE</h3>
                <div id="strategy-content" class="text-gray-300 whitespace-pre-wrap leading-relaxed min-h-[100px]"></div>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-20 text-gray-400 italic">게임을 조회하고 분석 중입니다...</div>
    </div>

    <script>
        const DDRAGON_VER = "14.5.1";

        async function startGameAnalysis() {
            const name = document.getElementById('summonerName').value;
            const tag = document.getElementById('tagLine').value;
            if(!name || !tag) return alert("소환사명과 태그를 입력해주세요!");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('analysis-result').classList.add('hidden');
            document.getElementById('status-badge').innerText = "LIVE 인게임 분석 중";

            try {
                const res = await fetch('/functions/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, tag })
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                renderTeam('blue-list', data.blueTeam, true);
                renderTeam('red-list', data.redTeam, false);
                document.getElementById('strategy-content').innerText = data.strategy;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('analysis-result').classList.remove('hidden');
            } catch (err) {
                alert("게임을 찾을 수 없거나 오류가 발생했습니다: " + err.message);
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderTeam(elementId, players, isBlue) {
            const list = document.getElementById(elementId);
            list.innerHTML = players.map(p => `
                <div class="flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center p-3 bg-[#1a1a1a] rounded border border-gray-800">
                    <img src="https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VER}/img/champion/${p.championName}.png" class="w-10 h-10 rounded">
                    <div class="mx-3 flex-1 overflow-hidden">
                        <div class="font-bold text-sm truncate">${p.summonerName}</div>
                        <div class="text-[10px] text-gray-500 uppercase">${p.championName}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
