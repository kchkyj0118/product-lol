<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL.ANALYZE - ⚡ 무결점 분석</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* 가독성 1순위: 무조건 블랙 배경, 화이트 글씨 */
        body { background-color: #000000 !important; color: #ffffff !important; font-family: sans-serif; }
        .card { background-color: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 12px; }
        .user-nick { font-size: 1.25rem; font-weight: 900; color: #3b82f6; text-transform: none; } /* 닉네임 강조 */
        .champ-label { font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .strategy-box { border-left: 4px solid #3b82f6; padding-left: 20px; margin-top: 20px; }
        .strategy-text { white-space: pre-line; line-height: 1.8; color: #eeeeee; font-size: 1rem; }
        input { background: #111 !important; color: #fff !important; border: 1px solid #333 !important; }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-5xl mx-auto p-4 md:p-10">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black italic text-blue-500 mb-8 tracking-tighter uppercase">Lol.Analyze</h1>
            <div class="inline-flex bg-[#111] border border-gray-800 rounded-2xl p-2 shadow-2xl">
                <input type="text" id="name" placeholder="닉네임" class="px-4 py-2 outline-none w-32 md:w-48 text-sm rounded-l-xl">
                <span class="text-gray-600 self-center font-bold px-1">#</span>
                <input type="text" id="tag" placeholder="KR1" class="px-2 py-2 outline-none w-16 md:w-20 font-bold text-blue-400">
                <button onclick="fetchGame()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold ml-2 transition-all active:scale-95 text-sm uppercase">분석</button>
            </div>
        </header>

        <!-- 로딩 표시 -->
        <div id="loader" class="hidden text-center py-24">
            <div class="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-6"></div>
            <p class="text-blue-400 font-black uppercase text-sm tracking-widest">Lightning Fast Engine Running...</p>
        </div>

        <div id="dashboard" class="hidden space-y-8 animate-in fade-in duration-500">
            <!-- 팀 리스트 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div id="blue-list" class="space-y-2"></div>
                <div id="red-list" class="space-y-2"></div>
            </div>

            <!-- 분석 리포트 -->
            <div id="report-card" class="card shadow-2xl">
                <h2 id="strat-title" class="text-xl font-black text-yellow-500 italic uppercase mb-6">Pro Analysis Report</h2>
                <div class="strategy-box">
                    <div id="analysis-content" class="strategy-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderTeams(pList, ver) {
            const blue = document.getElementById('blue-list');
            const red = document.getElementById('red-list');
            blue.innerHTML = '<h3 class="text-blue-500 font-black text-[10px] mb-2 opacity-50 tracking-widest">BLUE TEAM</h3>';
            red.innerHTML = '<h3 class="text-red-500 font-black text-[10px] mb-2 text-right opacity-50 tracking-widest">RED TEAM</h3>';

            pList.forEach(p => {
                const isBlue = p.team === 100;
                const html = `
                    <div class="flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center bg-[#0a0a0a] p-3 rounded-xl border border-[#1a1a1a]">
                        <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/champion/${p.cName}.png" class="w-12 h-12 rounded-lg border border-[#222]">
                        <div class="mx-4 flex-1 ${isBlue ? 'text-left' : 'text-right'}">
                            <div class="user-nick truncate">${p.nick}</div>
                            <div class="champ-label">${p.cName}</div>
                        </div>
                    </div>`;
                (isBlue ? blue : red).innerHTML += html;
            });
        }

        async function fetchGame() {
            const n = document.getElementById('name').value.trim();
            const t = document.getElementById('tag').value.trim();
            if (!n || !t) return alert("닉네임과 태그를 입력하세요.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: n, tag: t })
                });
                
                const data = await res.json();
                if (data.error) {
                    alert(data.error);
                    document.getElementById('loader').classList.add('hidden');
                    return;
                }

                // UI 결과 출력
                renderTeams(data.pList, data.ver);
                
                // 데이터 매핑 및 Undefined 방지
                document.getElementById('strat-title').innerText = `⚡ ${data.myChamp || 'PLAYER'} PRO ANALYSIS (G3F)`;
                document.getElementById('analysis-content').innerText = data.strategy;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                alert("분석 서버 연결 실패");
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
