function renderSide(id, players, ver, isBlue) {
    const list = document.getElementById(id);
    list.innerHTML = `<h2 class="text-[10px] font-black mb-3 ${isBlue?'text-blue-400':'text-red-400 text-right'}">${isBlue?'BLUE TEAM':'RED TEAM'}</h2>`;
    players.forEach(p => {
        const rPath = rMap[p.r] || "7200_Domination";
        list.innerHTML += `<div class="flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center bg-[#1a1d20] p-3 rounded-2xl border border-gray-800 mb-2">
            <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/champion/${p.cName}.png" class="w-11 h-11 rounded-xl border border-gray-700">
            <div class="mx-3 flex-1 overflow-hidden ${isBlue ? 'text-left' : 'text-right'}">
                <div class="text-[13px] font-bold truncate text-white">${p.nick}</div>
                <div class="text-[10px] text-gray-500 italic">${p.cName}</div>
            </div>
            <div class="flex gap-1.5">
                <div class="flex flex-col gap-0.5">
                    <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${sMap[p.s[0]]||'SummonerFlash'}.png" class="w-4 h-4 rounded-sm">
                    <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${sMap[p.s[1]]||'SummonerDot'}.png" class="w-4 h-4 rounded-sm">
                </div>
                <div class="w-9 h-9 bg-black/40 rounded-full border border-gray-700 flex items-center justify-center">
                    <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/${rPath}.png" class="w-5 h-5">
                </div>
            </div>
        </div>`;
    });
}
