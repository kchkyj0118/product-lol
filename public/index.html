<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL.ANALYZE - In-Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0d0f] text-white min-h-screen font-sans">
    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-blue-500 mb-6">LOL.ANALYZE</h1>
            <div class="inline-flex bg-[#1a1d20] border border-gray-700 rounded-2xl p-2 shadow-2xl">
                <input type="text" id="name" placeholder="닉네임" class="bg-transparent px-4 py-2 outline-none w-32 md:w-48 text-sm">
                <span class="text-gray-600 self-center">#</span>
                <input type="text" id="tag" placeholder="KR1" class="bg-transparent px-2 py-2 outline-none w-16 md:w-24 text-sm">
                <button onclick="fetchGame()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold transition-all ml-2">분석</button>
            </div>
        </header>

        <div id="loader" class="hidden text-center py-20 animate-pulse text-blue-400">라이브 게임 데이터를 분석 중입니다...</div>

        <div id="dashboard" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div id="blue-container" class="space-y-3">
                    <h2 class="text-blue-400 font-bold text-sm tracking-tighter mb-4">BLUE TEAM</h2>
                    <div id="blue-list" class="space-y-2"></div>
                </div>
                <div id="red-container" class="space-y-3">
                    <h2 class="text-red-400 font-bold text-sm tracking-tighter mb-4 text-right">RED TEAM</h2>
                    <div id="red-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="bg-[#14171a] border border-blue-900/30 p-6 rounded-2xl shadow-inner">
                <h3 class="text-yellow-500 font-bold mb-4 flex items-center italic">⚡ Gemini 3 Strategy Report</h3>
                <div id="strategy-box" class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        // 스펠 ID 매핑 (주요 스펠만)
        const spellMap = { 1: "SummonerBoost", 3: "SummonerExhaust", 4: "SummonerFlash", 6: "SummonerHaste", 7: "SummonerHeal", 11: "SummonerSmite", 12: "SummonerTeleport", 14: "SummonerDot", 21: "SummonerBarrier" };

        async function fetchGame() {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            if(!name || !tag) return alert("정보를 입력하세요.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, tag })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);

                renderTeam('blue-list', data.blueTeam, data.version, true);
                renderTeam('red-list', data.redTeam, data.version, false);
                document.getElementById('strategy-box').innerText = data.strategy;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderTeam(id, players, ver, isBlue) {
            const list = document.getElementById(id);
            list.innerHTML = players.map(p => `
                <div class="flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center bg-[#1a1d20] p-3 rounded-xl border border-gray-800 hover:border-gray-600 transition-all">
                    <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/champion/${p.championName}.png" class="w-12 h-12 rounded-lg shadow-lg border border-gray-700">
                    
                    <div class="mx-4 flex-1 overflow-hidden ${isBlue ? 'text-left' : 'text-right'}">
                        <div class="text-xs font-bold truncate">${p.name}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${p.championName}</div>
                    </div>

                    <div class="flex gap-1 items-center">
                        <div class="flex flex-col gap-0.5">
                            <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${spellMap[p.spell1] || 'SummonerFlash'}.png" class="w-5 h-5 rounded border border-black">
                            <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${spellMap[p.spell2] || 'SummonerDot'}.png" class="w-5 h-5 rounded border border-black">
                        </div>
                        <div class="w-8 h-8 bg-black rounded-full border border-gray-700 flex items-center justify-center overflow-hidden">
                            <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/${p.subStyle}.png" class="w-6 h-6 opacity-80" onerror="this.src='https://via.placeholder.com/24'">
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
