<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>롤팁 - AI 필승 전략</title>
    <style>
        /* 기존 스타일 유지 */
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .team-container { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; }
        .team { flex: 1; background: #2a2a2a; padding: 15px; border-radius: 10px; }
        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #333; }
        .champ-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555; }
        .strategy-box { margin-top: 30px; padding: 20px; background: #333; border-left: 5px solid #ffb900; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>롤팁</h1>
        <p>AI STRATEGIC COACHING SERVICE</p>
        <input type="text" id="sName" placeholder="아이디">
        <input type="text" id="tag" placeholder="#KR1">
        <button onclick="analyze()">게임 분석</button>

        <div class="team-container" id="resultArea" style="display:none;">
            <div class="team">
                <h3>BLUE TEAM</h3>
                <div id="blueList"></div>
            </div>
            <div class="team">
                <h3>RED TEAM</h3>
                <div id="redList"></div>
            </div>
        </div>

        <div id="strategyArea" class="strategy-box" style="display:none;">
            <h4>🚀 AI 필승 전략</h4>
            <div id="strategyText"></div>
        </div>
    </div>

    <script>
        async function analyze() {
            const summonerName = document.getElementById('sName').value;
            const tagLine = document.getElementById('tag').value.replace('#', '');
            
            const res = await fetch('/analyze', {
                method: 'POST',
                body: JSON.stringify({ summonerName, tagLine })
            });
            const data = await res.json();

            if(data.teams) {
                renderTeam('blueList', data.teams.Blue);
                renderTeam('redList', data.teams.Red);
                document.getElementById('strategyText').innerText = data.strategy;
                document.getElementById('resultArea').style.display = 'flex';
                document.getElementById('strategyArea').style.display = 'block';
            }
        }

        function renderTeam(elementId, players) {
            const list = document.getElementById(elementId);
            list.innerHTML = '';
            players.forEach(p => {
                const imgUrl = `https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${getChampName(p.champId)}.png`;
                list.innerHTML += `
                    <div class="player-row">
                        <img src="${imgUrl}" class="champ-img" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.5.1/img/profileicon/0.png'">
                        <div><strong>${p.name}</strong></div>
                    </div>`;
            });
        }

        // 챔피언 ID를 이름으로 변환 (주요 챔피언 예시, 실제로는 전체 리스트 필요)
        function getChampName(id) {
            const champs = { 1: "Annie", 2: "Olaf", 24: "Jax", 81: "Ezreal", 86: "Garen" }; // 필요한 챔피언 계속 추가 가능
            return champs[id] || "Garen"; // 못찾으면 기본 이미지
        }
    </script>
</body>
</html>
