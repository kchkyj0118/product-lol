<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤팁 | LoLTip</title>
    <style>
        body { background: #0f1014; color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 52px; font-weight: 900; color: #fff; margin: 0; letter-spacing: -2px; }
        .logo span { color: #e8a93a; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #1c1c1f; border: none; color: #9e9eb1; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #e8a93a; color: black; }

        .search-box { background: #1c1c1f; padding: 25px; border-radius: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        input, select { padding: 12px; background: #0f1014; border: 1px solid #323232; color: white; border-radius: 6px; }
        .main-btn { padding: 12px 24px; background: #e8a93a; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; color: black; }
        
        .board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .team { background: #1c1c1f; padding: 15px; border-radius: 10px; border-top: 4px solid #323232; min-height: 300px; }
        .blue { border-color: #4171d6; } .red { border-color: #e84057; }
        
        .p-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #2d2d31; gap: 12px; position: relative; }
        .c-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; background: #000; }
        .spell-stack { display: flex; flex-direction: column; gap: 2px; }
        .s-img { width: 22px; height: 22px; border-radius: 4px; background: #000; }
        
        .remove-btn { color: #e84057; cursor: pointer; font-weight: bold; margin-left: auto; padding: 5px; }
        #loading { text-align: center; display: none; color: #e8a93a; margin: 20px; font-weight: bold; }
        .strategy { margin-top: 20px; background: #1c1c1f; padding: 20px; border-radius: 10px; border-left: 5px solid #e8a93a; display: none; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">롤<span>팁</span></h1>
            <p style="color:#9e9eb1; font-size: 14px;">AI STRATEGIC COACHING SERVICE</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('analyze')">실시간 분석</button>
            <button class="tab-btn" onclick="switchTab('sim')">조합 시뮬레이션</button>
        </div>

        <div id="analyze-section">
            <div class="search-box">
                <input type="text" id="summonerName" placeholder="소환사명">
                <input type="text" id="tagLine" placeholder="태그 (예: KR1)">
                <button onclick="runLiveAnalysis()" class="main-btn">게임 분석</button>
            </div>
        </div>

        <div id="sim-section" style="display: none;">
            <div class="search-box">
                <select id="pos">
                    <option value="TOP">TOP</option>
                    <option value="JUNGLE">JNG</option>
                    <option value="MIDDLE">MID</option>
                    <option value="BOTTOM">ADC</option>
                    <option value="UTILITY">SPT</option>
                </select>
                <input type="text" id="champInput" list="champ-list" placeholder="챔피언명 (한글/영문)">
                <datalist id="champ-list">
                    <option value="가렌"><option value="리 신"><option value="피즈"><option value="신 짜오"><option value="아리">
                </datalist>
                <select id="s1">
                    <option value="SummonerFlash">점멸</option>
                    <option value="SummonerTeleport">텔포</option>
                    <option value="SummonerSmite">강타</option>
                </select>
                <select id="s2">
                    <option value="SummonerDot">점화</option>
                    <option value="SummonerFlash">점멸</option>
                    <option value="SummonerHeal">힐</option>
                </select>
                <button onclick="addToSim('Blue')" class="tab-btn" style="background:#4171d6; color:white;">Blue +</button>
                <button onclick="addToSim('Red')" class="tab-btn" style="background:#e84057; color:white;">Red +</button>
                <button onclick="runSim()" class="main-btn">결과 보기</button>
            </div>
        </div>

        <div id="loading">🚀 AI가 밴픽 데이터를 분석 중입니다...</div>
        
        <div id="display" class="board">
            <div class="team blue" id="blue-team"><strong>BLUE TEAM</strong></div>
            <div class="team red" id="red-team"><strong>RED TEAM</strong></div>
        </div>
        
        <div id="strategy-box" class="strategy"></div>
    </div>

    <script>
        const DDRAGON = "https://ddragon.leagueoflegends.com/cdn/14.5.1";
        const champMap = { "가렌": "Garen", "리신": "LeeSin", "리 신": "LeeSin", "피즈": "Fizz", "신짜오": "XinZhao", "신 짜오": "XinZhao", "아리": "Ahri" };
        let simData = { Blue: [], Red: [] };

        function switchTab(tab) {
            document.getElementById('analyze-section').style.display = tab === 'analyze' ? 'block' : 'none';
            document.getElementById('sim-section').style.display = tab === 'sim' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function getChampId(name) {
            return champMap[name] || name;
        }

        function addToSim(side) {
            const input = document.getElementById('champInput').value.trim();
            if(!input) return;
            const champId = getChampId(input);
            const pos = document.getElementById('pos').value;
            const s1 = document.getElementById('s1').value;
            const s2 = document.getElementById('s2').value;

            simData[side].push({ name: 'User', cName: input, champId: champId, pos: pos, spell1: s1, spell2: s2 });
            renderTeam(side.toLowerCase(), simData[side], true);
        }

        async function runLiveAnalysis() {
            const name = document.getElementById('summonerName').value.trim();
            const tag = document.getElementById('tagLine').value.trim().replace('#', '');
            if(!name || !tag) return alert("닉네임과 태그를 입력하세요.");

            document.getElementById('loading').style.display = 'block';
            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ summonerName: name, tagLine: tag })
                });
                const data = await res.json();
                renderTeam('blue', data.teams.Blue);
                renderTeam('red', data.teams.Red);
                document.getElementById('strategy-box').innerText = data.strategy;
                document.getElementById('strategy-box').style.display = 'block';
            } catch (e) { alert("분석 실패: " + e.message); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        async function runSim() {
            document.getElementById('loading').style.display = 'block';
            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isSim: true, teams: simData })
                });
                const data = await res.json();
                document.getElementById('strategy-box').innerText = data.strategy;
                document.getElementById('strategy-box').style.display = 'block';
            } catch (e) { alert("분석 실패: " + e.message); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function renderTeam(side, players, isSim = false) {
            const container = document.getElementById(`${side}-team`);
            container.innerHTML = `<strong>${side.toUpperCase()} TEAM</strong>`;
            players.forEach((p, i) => {
                container.innerHTML += `
                    <div class="p-row">
                        <img src="${DDRAGON}/img/champion/${p.champId}.png" class="c-img" onerror="this.src='${DDRAGON}/img/profileicon/29.jpg'">
                        <div class="spell-stack">
                            <img src="${DDRAGON}/img/spell/${p.spell1 || 'SummonerFlash'}.png" class="s-img">
                            <img src="${DDRAGON}/img/spell/${p.spell2 || 'SummonerDot'}.png" class="s-img">
                        </div>
                        <div>
                            <div style="font-weight:bold;">${p.name}</div>
                            <div style="font-size:12px; color:#9e9eb1;">${p.pos} - ${p.cName}</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
