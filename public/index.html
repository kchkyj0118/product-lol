<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL AI 전략 코치 | lol-coaches.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header">
            <h1>LOL AI COACH</h1>
            <p>실시간 메타 분석 기반 맞춤형 전략</p>
        </div>

        <div class="input-group">
            <label>내 포지션 선택</label>
            <select id="user-position">
                <option value="탑">TOP (탑)</option>
                <option value="정글">JUNGLE (정글)</option>
                <option value="미드">MID (미드)</option>
                <option value="원딜">ADC (원딜)</option>
                <option value="서포터">SUP (서포터)</option>
            </select>
        </div>

        <div class="input-group">
            <label>매치업 입력 (예: 카밀 vs 피오라)</label>
            <input type="text" id="matchup-input" placeholder="본인 챔피언 vs 상대 챔피언">
        </div>

        <button onclick="startAnalysis()">전략 분석 시작하기</button>

        <div id="result-display"></div>
    </div>

    <div class="faq-section">
        <h3>승률을 높이는 AI 코칭 가이드</h3>
        <details>
            <summary>분석 결과가 나오지 않는다면?</summary>
            <p>네트워크 상태를 확인하고, 챔피언 이름을 정확히 입력했는지 확인해주세요.</p>
        </details>
        <details>
            <summary>모든 티어에서 사용 가능한가요?</summary>
            <p>아이언부터 챌린저까지 각 티어별 평균 데이터를 기반으로 최적의 동선을 제시합니다.</p>
        </details>
    </div>
</div>

<footer>
    <p>© 2026 lol-coaches.com | All Rights Reserved.</p>
    <p>
        <a href="/privacy">개인정보 처리방침</a> | 
        <a href="/terms">이용약관</a>
    </p>
</footer>

<script src="main.js"></script>

</body>
</html>
