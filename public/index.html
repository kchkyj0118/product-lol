<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL AI PRO COACH | lol-coaches.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LOL AI PRO COACH</h1>
        <p>포지션별 자동 스펠 세팅 및 5:5 한타 정밀 분석</p>
    </div>

    <div class="matchup-grid">
        <div class="team-panel blue-side">
            <div class="team-label">BLUE TEAM</div>
            <div id="blue-team-inputs">
                <!-- JavaScript handles population -->
            </div>
        </div>

        <div class="vs-divider">VS</div>

        <div class="team-panel red-side">
            <div class="team-label">RED TEAM</div>
            <div id="red-team-inputs">
                <!-- JavaScript handles population -->
            </div>
        </div>
    </div>

    <div class="bottom-controls">
        <button onclick="startAnalysis()">프로급 한타 분석 시작</button>
    </div>

    <div id="result-display"></div>
</div>

</html>
