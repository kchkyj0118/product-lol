<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 롤 승리 플랜 코치</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-functions-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 롤 승리 플랜 코치</h1>
            <p>최신 패치 기반의 전문 분석 시스템</p>
        </header>

        <main>
            <section class="selection-area">
                <div class="team-selection">
                    <h3>우리 팀 (Allies)</h3>
                    <div class="inputs" id="ally-inputs">
                        <input type="text" placeholder="탑 챔피언" class="champion-input">
                        <input type="text" placeholder="정글 챔피언" class="champion-input">
                        <input type="text" placeholder="미드 챔피언" class="champion-input">
                        <input type="text" placeholder="원딜 챔피언" class="champion-input">
                        <input type="text" placeholder="서포터 챔피언" class="champion-input">
                    </div>
                </div>

                <div class="team-selection">
                    <h3>상대 팀 (Enemies)</h3>
                    <div class="inputs" id="enemy-inputs">
                        <input type="text" placeholder="탑 챔피언" class="champion-input">
                        <input type="text" placeholder="정글 챔피언" class="champion-input">
                        <input type="text" placeholder="미드 챔피언" class="champion-input">
                        <input type="text" placeholder="원딜 챔피언" class="champion-input">
                        <input type="text" placeholder="서포터 챔피언" class="champion-input">
                    </div>
                </div>
            </section>

            <section class="lane-selection">
                <h3>내 라인 선택</h3>
                <div class="lane-buttons">
                    <button class="lane-btn" data-lane="TOP">탑</button>
                    <button class="lane-btn" data-lane="JUNGLE">정글</button>
                    <button class="lane-btn" data-lane="MID">미드</button>
                    <button class="lane-btn" data-lane="ADC">원딜</button>
                    <button class="lane-btn" data-lane="SUPPORT">서포터</button>
                </div>
            </section>

            <button id="analyze-btn" class="main-btn">승리 플랜 분석하기</button>

            <section id="result-area" class="result-area hidden">
                <h2>분석 결과</h2>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>AI 코치가 조합을 분석 중입니다...</p>
                </div>
                <div id="analysis-content" class="markdown-body"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
