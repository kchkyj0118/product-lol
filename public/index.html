<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>AI 롤 코치</title>
    <style>
        body { background: #0f1014; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #1c1c1f; padding: 20px; border-radius: 8px; }
        input { padding: 12px; background: #0f1014; border: 1px solid #323232; color: white; border-radius: 4px; width: 150px; }
        button { padding: 12px 24px; background: #e8a93a; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .team { background: #1c1c1f; border-radius: 8px; overflow: hidden; border-top: 4px solid #323232; }
        .blue { border-color: #4171d6; } .red { border-color: #e84057; }
        .p-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #2d2d31; gap: 12px; }
        .c-img { width: 45px; height: 45px; border-radius: 50%; }
        .icons { display: grid; grid-template-columns: 22px 22px; gap: 3px; }
        .icon { width: 22px; height: 22px; border-radius: 3px; }
        .rune { border-radius: 50%; width: 24px; height: 24px; background: #000; }
        .info { flex-grow: 1; }
        .name { font-size: 14px; font-weight: bold; display: block; }
        .champ-sub { font-size: 11px; color: #9e9eb1; }
        .strategy { margin-top: 30px; background: #1c1c1f; padding: 20px; border-radius: 8px; border-left: 5px solid #e8a93a; white-space: pre-wrap; line-height: 1.6; }
        #loading { text-align: center; display: none; color: #e8a93a; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="name" placeholder="소환사명">
            <input type="text" id="tag" placeholder="태그 (#제외)">
            <button onclick="analyze()">실시간 분석</button>
        </div>
        <div id="loading">🚀 챌린저 코치가 분석 중...</div>
        <div class="board" id="board"></div>
        <div id="strategy" class="strategy" style="display:none"></div>
    </div>
    <script>
        const spells = { 21:"SummonerBarrier", 1:"SummonerBoost", 14:"SummonerDot", 3:"SummonerExhaust", 4:"SummonerFlash", 6:"SummonerHaste", 7:"SummonerHeal", 11:"SummonerSmite", 12:"SummonerTeleport" };
        async function analyze() {
            const n = document.getElementById('name').value.trim();
            let t = document.getElementById('tag').value.trim().replace('#', '');
            if(!n || !t) return alert('정보 입력!');
            document.getElementById('loading').style.display = 'block';
            try {
                const res = await fetch('/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({summonerName:n, tagLine:t}) });
                const d = await res.json();
                if(d.error) throw new Error(d.error);
                render(d.teams);
                document.getElementById('strategy').innerText = d.strategy;
                document.getElementById('strategy').style.display = 'block';
            } catch(e) { alert(e.message); }
            document.getElementById('loading').style.display = 'none';
        }
        function render(teams) {
            const b = document.getElementById('board'); b.innerHTML = '';
            ['Blue', 'Red'].forEach(side => {
                let html = `<div class="team ${side.toLowerCase()}"><div style="padding:10px; font-weight:bold;">${side} TEAM</div>`;
                teams[side].forEach(p => {
                    html += `<div class="p-row" style="${p.isMe ? 'background:rgba(232,169,58,0.15)' : ''}">
                        <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${p.champId}.png" class="c-img">
                        <div class="icons"><img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${spells[p.spell1]||'SummonerEmpty'}.png" class="icon"><img src="https://ddragon.leagueoflegends.com/cdn/img/${p.mainRuneIcon}" class="rune"><img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${spells[p.spell2]||'SummonerEmpty'}.png" class="icon"></div>
                        <div class="info"><span class="name">${p.summonerName}${p.isMe?' ⭐':''}</span><span class="champ-sub">${p.champKName}</span></div>
                    </div>`;
                });
                b.innerHTML += html + '</div>';
            });
        }
    </script>
</body>
</html>
