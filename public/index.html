<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL.ANALYZE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0d0f] text-white font-sans">
    <div class="max-w-5xl mx-auto p-4 md:p-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic text-blue-500 mb-8 tracking-tighter uppercase">Lol.Analyze</h1>
            <div class="inline-flex bg-[#1a1d20] border border-gray-700 rounded-2xl p-2 shadow-2xl">
                <input type="text" id="name" placeholder="닉네임" class="bg-transparent px-4 py-2 outline-none w-32 md:w-48 text-sm">
                <span class="text-gray-600 self-center font-bold">#</span>
                <input type="text" id="tag" placeholder="KR1" class="bg-transparent px-2 py-2 outline-none w-16 md:w-20 font-bold text-blue-400">
                <button onclick="fetchGame()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold ml-2 transition-transform active:scale-95">분석 시작</button>
            </div>
        </header>

        <div id="loader" class="hidden text-center py-20">
            <div class="animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-blue-400 font-bold">실시간 상성 및 훈수 로직을 계산 중...</p>
        </div>

        <div id="dashboard" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div id="blue-list" class="space-y-3"></div>
                <div id="red-list" class="space-y-3"></div>
            </div>

            <div class="bg-[#14171a] border border-gray-800 p-8 rounded-3xl shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="strat-title" class="text-xl font-black text-yellow-500 italic uppercase">Winning Strategy</h3>
                    <button id="toggle-btn" onclick="toggleDetail()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full text-xs font-bold transition-all shadow-lg">상세 훈수 보기 +</button>
                </div>
                <div id="strategy-box" class="text-gray-300 text-[15px] leading-relaxed whitespace-pre-wrap pt-4 border-t border-gray-800"></div>
            </div>
        </div>
    </div>

    <script>
        let fullStrat = "";
        let isDetail = false;
        const sMap = { 1: "SummonerBoost", 3: "SummonerExhaust", 4: "SummonerFlash", 6: "SummonerHaste", 7: "SummonerHeal", 11: "SummonerSmite", 12: "SummonerTeleport", 14: "SummonerDot", 21: "SummonerBarrier" };
        const rMap = { 8000: "7201_Precision", 8100: "7200_Domination", 8200: "7202_Sorcery", 8300: "7203_Whimsy", 8400: "7204_Resolve" };

        async function fetchGame() {
            const name = document.getElementById('name').value.trim();
            const tag = document.getElementById('tag').value.trim();
            if(!name || !tag) return alert("닉네임과 태그를 입력하세요.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, tag }) // 정확히 이 데이터만 전송
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || "분석 실패");

                renderTeam('blue-list', data.blue, data.version, true);
                renderTeam('red-list', data.red, data.version, false);
                
                fullStrat = data.strategy;
                document.getElementById('strat-title').innerText = "⚡ " + data.myChamp + " 핵심 훈수";
                showSummary();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                alert("오류: " + err.message);
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function showSummary() {
            const sum = fullStrat.split("[상세]")[0].replace("[요약]", "").trim();
            document.getElementById('strategy-box').innerText = sum;
            document.getElementById('toggle-btn').innerText = "상세 훈수 보기 +";
            isDetail = false;
        }

        function toggleDetail() {
            if(isDetail) showSummary();
            else {
                document.getElementById('strategy-box').innerText = fullStrat.replace("[요약]", "").replace("[상세]", "\n\n────────────────\n[운영 및 전투 상세 훈수]\n");
                document.getElementById('toggle-btn').innerText = "요약 보기 -";
                isDetail = true;
            }
        }

        function renderTeam(id, players, ver, isBlue) {
            const list = document.getElementById(id);
            list.innerHTML = '<h2 class="text-[10px] font-black mb-3 ' + (isBlue?'text-blue-500':'text-red-500 text-right') + '">' + (isBlue?'BLUE SIDE':'RED SIDE') + '</h2>';
            players.forEach(p => {
                const rPath = rMap[p.r] || "7200_Domination";
                list.innerHTML += '<div class="flex ' + (isBlue ? 'flex-row' : 'flex-row-reverse') + ' items-center bg-[#1a1d20] p-3 rounded-2xl border border-gray-800">' +
                    '<img src="https://ddragon.leagueoflegends.com/cdn/' + ver + '/img/champion/' + p.cName + '.png" class="w-11 h-11 rounded-xl border border-gray-700">' +
                    '<div class="mx-3 flex-1 overflow-hidden ' + (isBlue ? 'text-left' : 'text-right') + '">' +
                        '<div class="text-[12px] font-bold truncate text-white">' + p.nick + '</div>' + 
                        '<div class="text-[10px] text-gray-500">' + p.cName + '</div>' +
                    '</div>' +
                    '<div class="flex gap-1.5">' +
                        '<div class="flex flex-col gap-0.5">' +
                            '<img src="https://ddragon.leagueoflegends.com/cdn/' + ver + '/img/spell/' + (sMap[p.s[0]]||'SummonerFlash') + '.png" class="w-4 h-4 rounded-sm">' +
                            '<img src="https://ddragon.leagueoflegends.com/cdn/' + ver + '/img/spell/' + (sMap[p.s[1]]||'SummonerDot') + '.png" class="w-4 h-4 rounded-sm">' +
                        '</div>' +
                        '<div class="w-9 h-9 bg-black/50 rounded-full border border-gray-700 flex items-center justify-center">' +
                            '<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/' + rPath + '.png" class="w-5 h-5">' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });
        }
    </script>
</body>
</html>
