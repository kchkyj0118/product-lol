<script>
    async function startAnalysis() {
        const btn = document.getElementById('mainBtn');
        const name = document.getElementById('sName').value;
        const tag = document.getElementById('tag').value.replace('#', '');
        
        btn.innerText = "분석 중...";
        btn.disabled = true;

        try {
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ summonerName: name, tagLine: tag })
            });
            const data = await res.json();

            if (data.error) {
                alert(data.error); // 여기서 구체적인 에러(유저없음, 404 등)를 띄워줍니다.
                return;
            }

            // 10명 리스트 그리기 (이미지 엑박 방지 처리)
            renderPlayers('blueList', data.participants.filter(p => p.team === 'Blue'));
            renderPlayers('redList', data.participants.filter(p => p.team === 'Red'));
            
            document.getElementById('stratText').innerText = data.strategy;
            document.getElementById('resultView').style.display = 'grid';
            document.getElementById('stratBox').style.display = 'block';

        } catch (e) {
            alert("연결 실패: " + e.message);
        } finally {
            btn.innerText = "게임 분석";
            btn.disabled = false;
        }
    }

    function renderPlayers(id, list) {
        document.getElementById(id).innerHTML = list.map(p => `
            <div class="player-item">
                <img class="champ-img" src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/${p.champId}.png" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.5.1/img/profileicon/0.png'">
                <div class="icon-stack">
                    <img class="sub-icon" src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/SummonerFlash.png">
                    <div class="sub-icon" style="background:#333"></div>
                </div>
                <span class="player-name">${p.name}</span>
            </div>
        `).join('');
    }
</script>
