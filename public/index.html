<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoLTip | 롤팁</title>
    <style>
        body { background: #0f1014; color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .lang-btn { background: #1c1c1f; color: #555; border: 1px solid #323232; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .lang-btn.active { color: #e8a93a; border-color: #e8a93a; background: #2d2d31; }
        header { text-align: center; margin-bottom: 40px; padding-top: 10px; }
        .logo { font-size: 52px; font-weight: 900; letter-spacing: -3px; margin: 0; }
        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; }
        .tab { padding: 12px 25px; background: #1c1c1f; border: none; color: #9e9eb1; cursor: pointer; border-radius: 8px 8px 0 0; }
        .tab.active { background: #e8a93a; color: black; font-weight: bold; }
        .search-box { display: none; gap: 10px; justify-content: center; background: #1c1c1f; padding: 25px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box.active { display: flex; }
        input, select { padding: 12px; background: #0f1014; border: 1px solid #323232; color: white; border-radius: 6px; }
        button.main-btn { padding: 12px 24px; background: #e8a93a; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; color: black; }
        .board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team { background: #1c1c1f; padding: 15px; border-radius: 10px; border-top: 4px solid #323232; }
        .blue { border-color: #4171d6; } .red { border-color: #e84057; }
        .p-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #2d2d31; gap: 12px; }
        .c-img { width: 42px; height: 42px; border-radius: 50%; border: 1px solid #444; }
        .strategy { margin-top: 25px; background: #1c1c1f; padding: 20px; border-radius: 10px; border-left: 5px solid #e8a93a; white-space: pre-wrap; line-height: 1.7; display: none; }
        #loading { text-align: center; display: none; color: #e8a93a; margin: 20px 0; font-weight: bold; }
        .footer-info { margin-top: 50px; border-top: 1px solid #2d2d31; padding-top: 20px; }
        .recent-tag { background: #2d2d31; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #444; }
        .ai-banner { background: #1c1c1f; border: 1px dashed #e8a93a; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-bar">
            <button onclick="setLang('ko')" class="lang-btn" id="btn-ko">KO</button>
            <button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button>
        </div>

        <header>
            <h
