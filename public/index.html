<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL.ANALYZE - 다크모드 분석</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* 가독성 100% 확보: 블랙 & 화이트 고정 */
        body { background-color: #000000 !important; color: #ffffff !important; }
        .card { background-color: #111111; border: 1px solid #333333; padding: 20px; border-radius: 12px; }
        .player-nick { font-weight: 900; color: #3b82f6; font-size: 1.1rem; }
        .champion-label { color: #888888; font-size: 0.75rem; text-transform: uppercase; }
        .strategy-text { white-space: pre-line; line-height: 1.8; color: #eeeeee; font-size: 0.95rem; }
        input { background-color: #1a1d20 !important; color: #ffffff !important; border: 1px solid #444 !important; }
        input::placeholder { color: #666; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="max-w-5xl mx-auto p-4 md:p-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic text-blue-500 mb-8 tracking-tighter uppercase">Lol.Analyze</h1>
            <div class="inline-flex bg-[#1a1d20] border border-gray-700 rounded-2xl p-2 shadow-2xl">
                <input type="text" id="name" placeholder="닉네임" class="px-4 py-2 outline-none w-32 md:w-48 text-sm rounded-l-xl">
                <span class="text-gray-600 self-center font-bold px-1">#</span>
                <input type="text" id="tag" placeholder="KR1" class="px-2 py-2 outline-none w-16 md:w-20 font-bold text-blue-400">
                <button onclick="fetchGame()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold ml-2 transition-all active:scale-95 text-sm">분석 시작</button>
            </div>
        </header>

        <div id="loader" class="hidden text-center py-20">
            <div class="animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-blue-400 font-bold">초고속 엔진으로 분석 중...</p>
        </div>

        <div id="dashboard" class="hidden space-y-8">
            <!-- 팀 리스트 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div id="blue-list" class="space-y-3"></div>
                <div id="red-list" class="space-y-3"></div>
            </div>

            <!-- 전략 결과 -->
            <div id="analysis-area" class="card">
                <!-- displayResult 함수에서 내용 채움 -->
            </div>
        </div>
    </div>

    <script>
        const sMap = { 1: "SummonerBoost", 3: "SummonerExhaust", 4: "SummonerFlash", 6: "SummonerHaste", 7: "SummonerHeal", 11: "SummonerSmite", 12: "SummonerTeleport", 14: "SummonerDot", 21: "SummonerBarrier" };
        const rMap = { 8000: "7201_Precision", 8100: "7200_Domination", 8200: "7202_Sorcery", 8300: "7203_Whimsy", 8400: "7204_Resolve" };

        function renderTeams(pList, ver) {
            const blueBox = document.getElementById('blue-list');
            const redBox = document.getElementById('red-list');
            blueBox.innerHTML = '<h2 class="text-blue-500 font-black mb-4 text-xs opacity-70">BLUE SIDE</h2>';
            redBox.innerHTML = '<h2 class="text-red-500 font-black mb-4 text-xs opacity-70 text-right">RED SIDE</h2>';

            pList.forEach(p => {
                const isBlue = p.team === 100;
                const target = isBlue ? blueBox : redBox;
                const rIcon = rMap[p.r] || "7200_Domination";
                const html = `
                    <div class="flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center bg-[#111] p-3 rounded-xl border border-[#333]">
                        <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/champion/${p.cName}.png" class="w-12 h-12 rounded-lg border border-[#444]">
                        <div class="mx-4 flex-1 ${isBlue ? 'text-left' : 'text-right'}">
                            <div class="player-nick">${p.nick}</div>
                            <div class="champion-label">${p.cName}</div>
                        </div>
                        <div class="flex gap-2">
                            <div class="flex flex-col gap-1">
                                <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${sMap[p.s[0]] || 'SummonerFlash'}.png" class="w-5 h-5 rounded-md">
                                <img src="https://ddragon.leagueoflegends.com/cdn/${ver}/img/spell/${sMap[p.s[1]] || 'SummonerDot'}.png" class="w-5 h-5 rounded-md">
                            </div>
                            <div class="w-11 h-11 bg-black rounded-full border border-[#333] flex items-center justify-center">
                                <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/${rIcon}.png" class="w-6 h-6">
                            </div>
                        </div>
                    </div>`;
                target.innerHTML += html;
            });
        }

        async function fetchGame() {
            const name = document.getElementById('name').value.trim();
            const tag = document.getElementById('tag').value.trim();
            if (!name || !tag) return alert("닉네임과 태그를 입력하세요.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, tag })
                });
                
                const data = await res.json();
                if (data.error) {
                    alert(data.error);
                    document.getElementById('loader').classList.add('hidden');
                    return;
                }

                renderTeams(data.pList, data.ver);
                
                const area = document.getElementById('analysis-area');
                area.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-black text-yellow-500 italic uppercase">⚡ ${data.myC} Pro Analysis</h2>
                        <button onclick="document.getElementById('detail-text').classList.toggle('hidden')" class="text-[10px] font-bold text-blue-400 border border-blue-900 px-3 py-1 rounded-full">Detail +/-</button>
                    </div>
                    <div class="strategy-text border-l-4 border-blue-600 pl-5">
                        ${data.strategy.split('[상세]')[0].replace('[요약]', '').trim()}
                    </div>
                    <div id="detail-text" class="hidden mt-6 pt-6 border-t border-[#333] strategy-text text-gray-400 italic">
                        ${data.strategy.split('[상세]')[1] || "상세 데이터 분석 중..."}
                    </div>
                `;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                alert("통신 오류");
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
