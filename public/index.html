<script>
    function renderTeam(id, players, isBlue, version) {
        const container = document.getElementById(id);
        container.innerHTML = `<h4 class="${isBlue ? 'text-blue-400' : 'text-red-400'} font-bold mb-3 text-xs uppercase">${isBlue ? 'Blue Team' : 'Red Team'}</h4>`;
        
        players.forEach(p => {
            const champImg = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${p.championKey}.png`;
            // 스펠 및 룬은 예시 경로입니다 (실제 매핑 테이블 필요)
            const spell1Img = `https://ddragon.leagueoflegends.com/cdn/${version}/img/spell/SummonerFlash.png`; 
    
            const row = document.createElement('div');
            row.className = `flex ${isBlue ? 'flex-row' : 'flex-row-reverse'} items-center p-3 bg-[#16191c] rounded-xl border border-gray-800 mb-2 shadow-lg`;
            row.innerHTML = `
                <img src="${champImg}" class="w-12 h-12 rounded-lg border border-gray-700 shadow-md" onerror="this.src='https://via.placeholder.com/48'">
                
                <div class="mx-4 flex-1 overflow-hidden">
                    <div class="text-sm font-bold truncate ${isBlue ? 'text-blue-100' : 'text-red-100'}">${p.summonerName}</div>
                    <div class="text-[10px] text-gray-500 uppercase font-mono">${p.championKey}</div>
                </div>
    
                <div class="flex gap-1 items-center">
                    <div class="flex flex-col gap-1">
                        <div class="w-5 h-5 bg-gray-900 rounded border border-gray-700 overflow-hidden">
                            <img src="https://ddragon.leagueoflegends.com/cdn/${version}/img/spell/SummonerFlash.png" class="scale-110">
                        </div>
                        <div class="w-5 h-5 bg-gray-900 rounded border border-gray-700 overflow-hidden">
                            <img src="https://ddragon.leagueoflegends.com/cdn/${version}/img/spell/SummonerDot.png" class="scale-110">
                        </div>
                    </div>
                    <div class="w-8 h-8 bg-gray-900 rounded-full border border-gray-700 flex items-center justify-center overflow-hidden">
                         <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/7200_Domination.png" class="w-6 h-6">
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
    }
    </script>
