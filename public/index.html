<div id="sim-section" style="display: none;">
    <div class="search-box">
        <select id="pos">
            <option value="TOP">TOP</option>
            <option value="JUNGLE">JNG</option>
            <option value="MIDDLE">MID</option>
            <option value="BOTTOM">ADC</option>
            <option value="UTILITY">SPT</option>
        </select>
        <input type="text" id="champInput" list="champ-list" placeholder="챔피언명 (한글/영문)">
        <datalist id="champ-list">
            <option value="가렌"><option value="럭스"><option value="리 신"><option value="아리"><option value="이즈리얼">
            <option value="카이사와"><option value="제드"><option value="피즈"><option value="신 짜오">
        </datalist>
        
        <select id="s1">
            <option value="SummonerFlash">점멸</option>
            <option value="SummonerTeleport">텔포</option>
            <option value="SummonerSmite">강타</option>
        </select>
        <select id="s2">
            <option value="SummonerDot">점화</option>
            <option value="SummonerFlash">점멸</option>
            <option value="SummonerHeal">힐</option>
        </select>
        <button onclick="addToSim('Blue')" class="tab-btn" style="background:#4171d6; color:white;">Blue +</button>
        <button onclick="addToSim('Red')" class="tab-btn" style="background:#e84057; color:white;">Red +</button>
        <button onclick="runSim()" class="main-btn">결과 보기</button>
    </div>
</div>

<script>
// ... (이전 소스코드의 변수 및 getChampId 등 유지) ...

// 시뮬레이션 결과 보기 버튼 함수
async function runSim() {
    if (simData.Blue.length === 0 && simData.Red.length === 0) {
        return alert("챔피언을 최소 한 명 이상 추가해주세요.");
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('strategy-box').style.display = 'none';

    try {
        const res = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                isSim: true, // 시뮬레이션임을 서버에 알림
                teams: simData 
            })
        });
        
        if (!res.ok) throw new Error("서버 응답 오류");

        const data = await res.json();
        const strategyBox = document.getElementById('strategy-box');
        strategyBox.innerText = data.strategy;
        strategyBox.style.display = 'block';
        // 결과창으로 자동 스크롤
        strategyBox.scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
        alert("결과 분석 실패: " + e.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

// ... (나머지 addToSim, renderTeam 함수 등 유지) ...
</script>
