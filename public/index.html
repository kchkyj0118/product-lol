<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤팁 - AI 필승 전략</title>
    <style>
        /* 원래의 예쁜 디자인 그대로 복구 */
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .logo { font-size: 48px; font-weight: bold; color: #ffb900; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-bottom: 40px; }
        .input-group { background: #1e1e1e; padding: 30px; border-radius: 12px; display: inline-flex; gap: 10px; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px 20px; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #ffb900; }
        button { background: #ffb900; border: none; color: #121212; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #e6a700; transform: translateY(-2px); }

        /* 팀 레이아웃 */
        .result-container { display: none; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .team-card { background: #1e1e1e; border-radius: 12px; padding: 20px; text-align: left; border-top: 4px solid #444; }
        .blue-team { border-top-color: #4488ff; }
        .red-team { border-top-color: #ff4444; }
        .team-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #ccc; }
        .player-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #2a2a2a; }
        .champ-icon { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; object-fit: cover; }
        .player-info { flex: 1; }
        .player-name { font-weight: bold; font-size: 16px; }

        /* 필승 전략 박스 */
        .strategy-box { display: none; margin-top: 30px; background: #1e1e1e; padding: 25px; border-radius: 12px; border-left: 6px solid #ffb900; text-align: left; line-height: 1.6; }
        .strategy-title { color: #ffb900; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">롤팁</div>
        <div class="subtitle">AI STRATEGIC COACHING SERVICE</div>
        
        <div class="input-group">
            <input type="text" id="summonerName" placeholder="아이디" value="김창훈">
            <input type="text" id="tagLine" placeholder="kr1" value="kr1" style="width: 80px;">
            <button id="btnAnalyze" onclick="startAnalysis()">게임 분석</button>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="team-card blue-team">
                <div class="team-title">BLUE TEAM</div>
                <div id="blueTeamList"></div>
            </div>
            <div class="team-card red-team">
                <div class="team-title">RED TEAM</div>
                <div id="redTeamList"></div>
            </div>
        </div>

        <div class="strategy-box" id="strategyBox">
            <div class="strategy-title">🚀 AI 필승 전략 분석 결과</div>
            <div id="strategyContent" style="color: #ddd;"></div>
        </div>
    </div>

    <script>
        // 챔피언 ID를 이미지로 바꾸는 로직
        const getChampImg = (id) => `https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/${id}.png`;

        async function startAnalysis() {
            const btn = document.getElementById('btnAnalyze');
            const sName = document.getElementById('summonerName').value;
            const tLine = document.getElementById('tagLine').value.replace('#', '');
            
            btn.innerText = "분석 중...";
            btn.disabled = true;

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ summonerName: sName, tagLine: tLine })
                });
                const data = await response.json();

                if (data.teams) {
                    renderTeam('blueTeamList', data.teams.Blue);
                    renderTeam('redTeamList', data.teams.Red);
                    document.getElementById('strategyContent').innerText = data.strategy;
                    
                    document.getElementById('resultContainer').style.display = 'grid';
                    document.getElementById('strategyBox').style.display = 'block';
                }
            } catch (err) {
                alert("분석 중 오류가 발생했습니다.");
            } finally {
                btn.innerText = "게임 분석";
                btn.disabled = false;
            }
        }

        function renderTeam(id, players) {
            const container = document.getElementById(id);
            container.innerHTML = players.map(p => `
                <div class="player-item">
                    <img src="${getChampImg(p.champId)}" class="champ-icon" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.5.1/img/profileicon/0.png'">
                    <div class="player-info">
                        <div class="player-name">${p.name}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
