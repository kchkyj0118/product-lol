<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL AI PRO COACH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header">
            <h1>LOL AI PRO COACH</h1>
            <p>프로팀 분석관의 실시간 교전 전략</p>
        </div>

        <div class="section-title">CHAMPION MATCHUP</div>
        <div class="flex-row">
            <div class="input-item">
                <input type="text" id="myChamp" placeholder="내 챔피언 (예: 리신)">
            </div>
            <div class="input-item">
                <input type="text" id="opChamp" placeholder="상대 챔피언 (예: 카직스)">
            </div>
        </div>

        <div class="section-title">BATTLE SETTING</div>
        <div class="flex-row">
            <div class="input-item">
                <select id="fightScale">
                    <option value="1대1">1대1 (라인전/카정)</option>
                    <option value="2대2">2대2 (정글-라이너 교전)</option>
                    <option value="3대3">3대3 (소규모 한타/오브젝트)</option>
                    <option value="5대5">5대5 (정식 한타)</option>
                </select>
            </div>
            <div class="input-item">
                <select id="mySpell">
                    <option value="점멸/강타">점멸 / 강타</option>
                    <option value="점멸/점화">점멸 / 점화</option>
                    <option value="점멸/텔포">점멸 / 텔포</option>
                    <option value="점멸/탈진">점멸 / 탈진</option>
                </select>
            </div>
        </div>

        <button onclick="runProAnalysis()">프로 전략 분석 시작</button>

        <div id="loading-bar" class="loading">🌀 프로 코치가 리플레이 데이터를 대조 중입니다...</div>
        <div id="analysis-result"></div>
    </div>
</div>

<footer>
    <p>© 2026 lol-coaches.com | All Rights Reserved.</p>
    <p>
        <a href="/privacy">개인정보 처리방침</a> | 
        <a href="/terms">이용약관</a>
    </p>
</footer>

<script src="main.js"></script>
</body>
</html>
