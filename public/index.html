<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 롤 승리 플랜 코치</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI 롤 승리 플랜 코치</h1>
        
        <div class="main-layout">
            <div class="team-section">
                <h3>우리 팀 (Allies)</h3>
                <div id="blue-team-list"></div>
                <button class="add-btn" onclick="addPlayer('blue')">+ 아군 추가</button>
            </div>
            
            <div class="team-section">
                <h3>상대 팀 (Enemies)</h3>
                <div id="red-team-list"></div>
                <button class="add-btn" onclick="addPlayer('red')">+ 적군 추가</button>
            </div>
        </div>

        <div class="analysis-control">
            <button id="analyze-btn" onclick="startAnalysis()">승리 플랜 분석 시작</button>
        </div>

        <div id="result" class="result-area hidden">
            <div id="loading" class="hidden">분석 중...</div>
            <div id="analysis-content"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
