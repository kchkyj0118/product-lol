<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL 실시간 승리 전략 분석기</title>
    <style>
        body { background: #0f1014; color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #1c1c1f; padding: 20px; border-radius: 8px; }
        input { padding: 12px; background: #0f1014; border: 1px solid #323232; color: white; border-radius: 4px; width: 180px; }
        button { padding: 12px 24px; background: #e8a93a; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: #0f1014; }
        .board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .team { background: #1c1c1f; border-radius: 8px; overflow: hidden; }
        .blue { border-top: 4px solid #4171d6; } .red { border-top: 4px solid #e84057; }
        .team-title { padding: 12px; font-weight: bold; background: rgba(255,255,255,0.05); text-align: center; }
        .p-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #2d2d31; gap: 15px; }
        .c-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #323232; }
        .icons { display: grid; grid-template-columns: 24px 24px; gap: 4px; }
        .icon { width: 24px; height: 24px; border-radius: 4px; }
        .rune { border-radius: 50%; width: 26px; height: 26px; background: #000; }
        .info { flex-grow: 1; }
        .name { font-size: 15px; font-weight: bold; color: #fff; display: block; margin-bottom: 2px; }
        .champ-name { font-size: 12px; color: #9e9eb1; }
        .strategy { margin-top: 30px; background: #1c1c1f; padding: 25px; border-radius: 8px; border-left: 5px solid #e8a93a; line-height: 1.8; }
        #loading { text-align: center; display: none; color: #e8a93a; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#e8a93a; margin-bottom:20px;">🏆 LoL 실시간 승리 전략 분석기</h2>
        <div class="search-box">
            <input type="text" id="name" placeholder="소환사명 (예: 김창훈)">
            <input type="text" id="tag" placeholder="태그 (예: KR1)">
            <button onclick="analyze()">실시간 분석 시작</button>
        </div>
        <div id="loading">🚀 라이엇 서버에서 데이터 수집 및 Gemini 분석 중...</div>
        <div class="board" id="board"></div>
        <div id="strategy" class="strategy" style="display:none">
            <h3 style="margin:0 0 15px 0; color:#e8a93a; display:flex; align-items:center;">🤖 Gemini의 실시간 승리 제언</h3>
            <div id="st-text"></div>
        </div>
    </div>

    <script>
        const spells = { 21:"SummonerBarrier", 1:"SummonerBoost", 14:"SummonerDot", 3:"SummonerExhaust", 4:"SummonerFlash", 6:"SummonerHaste", 7:"SummonerHeal", 11:"SummonerSmite", 12:"SummonerTeleport" };

        async function analyze() {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            if(!name || !tag) return alert('닉네임과 태그를 모두 입력해주세요!');
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('board').innerHTML = '';
            document.getElementById('strategy').style.display = 'none';

            try {
                const res = await fetch('/analyze', { 
                    method:'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ summonerName:name, tagLine:tag }) 
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                render(data.teams);
                document.getElementById('st-text').innerHTML = data.strategy.replace(/\n/g, '<br>');
                document.getElementById('strategy').style.display = 'block';
            } catch(e) { alert("에러 발생: " + e.message); }
            document.getElementById('loading').style.display = 'none';
        }

        function render(teams) {
            const board = document.getElementById('board');
            ['Blue', 'Red'].forEach(side => {
                let html = `<div class="team ${side.toLowerCase()}"><div class="team-title">${side.toUpperCase()} TEAM</div>`;
                teams[side].forEach(p => {
                    html += `
                    <div class="p-row">
                        <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/champion/${p.champId}.png" class="c-img">
                        <div class="icons">
                            <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${spells[p.spell1]||'SummonerEmpty'}.png" class="icon" title="스펠1">
                            <img src="https://ddragon.leagueoflegends.com/cdn/img/${p.mainRuneIcon}" class="rune" title="핵심룬">
                            <img src="https://ddragon.leagueoflegends.com/cdn/14.5.1/img/spell/${spells[p.spell2]||'SummonerEmpty'}.png" class="icon" title="스펠2">
                        </div>
                        <div class="info">
                            <span class="name">${p.summonerName}</span>
                            <span class="champ-name">${p.champKName}</span>
                        </div>
                    </div>`;
                });
                board.innerHTML += html + `</div>`;
            });
        }
    </script>
</body>
</html>
